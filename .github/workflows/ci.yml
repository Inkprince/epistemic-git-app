name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (monorepo)
        run: npm run typecheck
      - name: Typecheck (tool app)
        run: npm run typecheck -w @epistemic-git/tool
      - name: Unit tests + SSR smoke (includes committed-artifact id regression)
        run: npm test
      - name: Production build
        run: npm run build:tool
      - name: Upload built tool
        uses: actions/upload-artifact@v4
        with:
          name: tool-dist
          path: apps/tool/dist
          retention-days: 7
